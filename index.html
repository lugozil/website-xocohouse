<head>

<link rel="preconnect" href="https://fonts.googleapis.com" />

<body>
<div id="root"></div>

<script src="reveal.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
  const { useEffect } = React;
  function App() {
    useEffect(() => {
      const t = setTimeout(() => {
        document.querySelectorAll('.rise').forEach(el => el.classList.add('in'));
        if (window.initReveal) window.initReveal();
      }, 60);
      return () => clearTimeout(t);
    }, []);
    return (
      <React.Fragment>
        <Nav active="index.html" />
        <Hero />
        <Intro />
        <EventTypes />
        <SpacesPreview />
        <FeatureBand />
        <Quote />
        <Footer />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
